apiVersion: v1
kind: Service
metadata:
  name: lead-service
  namespace: insightflow-ai
spec:
  selector:
    app: lead-service
  ports:
    - name: http
      port: 8100
      targetPort: 8100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lead-service
  namespace: insightflow-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lead-service
  template:
    metadata:
      labels:
        app: lead-service
    spec:
      containers:
        - name: lead-service
          image: local/insightflow-ai-lead-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
          envFrom:
            - configMapRef:
                name: insightflow-ai-config
            - secretRef:
                name: insightflow-ai-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: lead-service
  namespace: insightflow-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: lead-service
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: lead-service
  namespace: insightflow-ai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: lead-service
