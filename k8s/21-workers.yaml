          persistentVolumeClaim:
            claimName: insightflow-ai-storage
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-file
  namespace: insightflow-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
